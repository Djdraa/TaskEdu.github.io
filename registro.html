<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TaskEdu</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body>

    <div class="form-container">
        <h2>Crear Cuenta</h2>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">
            Únete a la plataforma de gestión académica
        </p>
        
        <form id="registerForm">

            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Nombres</label>
                    <input type="text" id="nombre" placeholder="Ej: Deivy" required>
                </div>

                <div class="form-group" style="flex: 1;">
                    <label>Apellidos</label>
                    <input type="text" id="apellido" placeholder="Ej: Alegría" required>
                </div>
            </div>

            <div class="form-group">
                <label>Cédula / Documento</label>
                <input type="number" id="documento" placeholder="Número de identificación" required>
            </div>

            <div class="form-group">
                <label>Fecha de Nacimiento</label>
                <input type="date" id="fechaNacimiento" required>
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="correo" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="contrasena" placeholder="Mínimo 8 caracteres" required>
            </div>

            <button type="submit" class="btn-primary">Finalizar Registro</button>

            <div style="margin-top: 20px; text-align: center;">
                <p class="switch-form">
                    ¿Ya tienes cuenta?
                    <a href="login.html">Inicia sesión</a>
                </p>
            </div>

        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
